name: Publish v2 documentation

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact 40-character v2 commit SHA to publish
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Validate immutable source input
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          [[ "$SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]] || { echo "source_sha must be a full commit SHA"; exit 1; }

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha }}

      - name: Confirm checked-out source
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA,,}"

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm

      - run: npm ci
      - run: npm run docs:check
      - run: npm run docs:build:pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/docs-pages
      - id: deployment
        uses: actions/deploy-pages@v4
