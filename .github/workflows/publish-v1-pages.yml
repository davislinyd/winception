name: Publish v1 GitHub Pages

on:
  push:
    tags:
      - 'v1.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing stable v1 tag to publish (for example, v1.0.3)
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve stable v1 release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          if [[ ! "$tag" =~ ^v1\.[0-9]+\.[0-9]+$ ]]; then
            echo "Only stable v1 release tags are publishable: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out Pages builder
        uses: actions/checkout@v6
        with:
          path: .pages-builder

      - name: Check out release source
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          path: release-source

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static v1 documentation
        shell: pwsh
        run: >
          ./.pages-builder/tools/Build-GitHubPages.ps1
          -ReleaseTag '${{ steps.release.outputs.tag }}'
          -OutputDirectory '_site'
          -SourceDirectory 'release-source'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
