<svg viewBox="0 0 760 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, 'Noto Sans TC', 'PingFang TC', sans-serif">
  <style>
    .bg{fill:#F7F2E9}
    .title{fill:#2A2520;font-weight:600;font-size:19px;text-anchor:middle}
    .subtitle{fill:#6E6353;font-size:12.5px;text-anchor:middle}
    .lane{fill:#9C4221;font-weight:600;font-size:12px;letter-spacing:.5px;text-anchor:middle}
    .step{fill:#FFFFFF;stroke:#D9CEBA;stroke-width:1.4}
    .start{fill:#FBF6EC;stroke:#E4DAC8;stroke-width:1.5}
    .gate{fill:#FCF3E8;stroke:#E7C9A6;stroke-width:1.5}
    .done{fill:#9C4221;stroke:#7E351A;stroke-width:1.4}
    .t{fill:#2A2520;font-weight:600;font-size:13px;text-anchor:middle}
    .el{fill:#6E6353;font-size:11px;text-anchor:middle}
    .tw{fill:#FFFFFF;font-weight:600;font-size:14px;text-anchor:middle}
    .tg{fill:#7E351A;font-weight:600;font-size:12.5px;text-anchor:middle}
    .no{fill:#9C4221;font-size:10.5px;text-anchor:middle}
    .yes{fill:#6E6353;font-size:11px;text-anchor:start}
    .arrow{fill:none;stroke:#8B7E68;stroke-width:1.7}
    .loop{fill:none;stroke:#B25B36;stroke-width:1.6;stroke-dasharray:5 4}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8B7E68"/></marker>
    <marker id="al" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#B25B36"/></marker>
  </defs>

  <rect class="bg" width="760" height="1000"/>
  <text class="title" x="380" y="34">用戶流程圖 · operator 在 Web Console 的部署路徑</text>
  <text class="subtitle" x="380" y="54">引導設定 Guided Setup 共 10 步 · 兩道安全閘門</text>

  <rect class="start" x="165" y="74" width="430" height="44" rx="10"/>
  <text class="t" x="380" y="101">執行 Setup-DeploymentServer.cmd → 開啟 Web Console :8080</text>
  <path class="arrow" d="M380,118 V150" marker-end="url(#a)"/>
  <text class="lane" x="380" y="140">引導設定 GUIDED SETUP</text>

  <!-- steps 1..8 -->
  <g>
    <rect class="step" x="230" y="152" width="300" height="40" rx="8"/><text class="t" x="380" y="177">1 · Project root</text>
    <rect class="step" x="230" y="204" width="300" height="40" rx="8"/><text class="t" x="380" y="229">2 · Web service IP</text>
    <rect class="step" x="230" y="256" width="300" height="40" rx="8"/><text class="t" x="380" y="281">3 · Deployment secrets</text>
    <rect class="step" x="230" y="308" width="300" height="40" rx="8"/><text class="t" x="380" y="333">4 · Prepare runtime</text>
    <rect class="step" x="230" y="360" width="300" height="40" rx="8"/><text class="t" x="380" y="385">5 · PXE / service endpoint</text>
    <rect class="step" x="230" y="412" width="300" height="40" rx="8"/><text class="t" x="380" y="437">6 · OS Image Cache</text>
    <rect class="step" x="230" y="464" width="300" height="40" rx="8"/><text class="t" x="380" y="489">7 · Publish profile</text>
    <rect class="step" x="230" y="516" width="300" height="40" rx="8"/><text class="t" x="380" y="541">8 · Run preflight</text>
    <path class="arrow" d="M380,192 V204" marker-end="url(#a)"/>
    <path class="arrow" d="M380,244 V256" marker-end="url(#a)"/>
    <path class="arrow" d="M380,296 V308" marker-end="url(#a)"/>
    <path class="arrow" d="M380,348 V360" marker-end="url(#a)"/>
    <path class="arrow" d="M380,400 V412" marker-end="url(#a)"/>
    <path class="arrow" d="M380,452 V464" marker-end="url(#a)"/>
    <path class="arrow" d="M380,504 V516" marker-end="url(#a)"/>
  </g>

  <rect class="step" x="540" y="458" width="168" height="54" rx="8"/>
  <text class="t" x="624" y="482">可選 · Offline ISO</text>
  <text class="el" x="624" y="499">host-side 匯出到</text>
  <text class="el" x="624" y="512">&lt;project-root&gt;\Exports</text>
  <path class="loop" d="M530,484 H538" marker-end="url(#al)"/>

  <!-- gate 1: preflight -->
  <path class="arrow" d="M380,556 V564" marker-end="url(#a)"/>
  <polygon class="gate" points="380,566 452,600 380,634 308,600"/>
  <text class="tg" x="380" y="596">Preflight</text>
  <text class="tg" x="380" y="610">全部通過?</text>
  <path class="loop" d="M308,600 C232,606 200,536 230,536" marker-end="url(#al)"/>
  <text class="no" x="196" y="566">否 · 修正後重跑</text>
  <text class="no" x="196" y="580">不啟 DHCP / 不 PXE</text>
  <text class="yes" x="392" y="652">是</text>

  <!-- gate 2: LAN DHCP -->
  <path class="arrow" d="M380,634 V668" marker-end="url(#a)"/>
  <polygon class="gate" points="380,670 458,704 380,738 302,704"/>
  <text class="tg" x="380" y="700">確認 LAN 無</text>
  <text class="tg" x="380" y="714">其他 DHCP?</text>
  <path class="loop" d="M302,704 C238,712 240,664 344,672" marker-end="url(#al)"/>
  <text class="no" x="198" y="700">否 · 先關閉</text>
  <text class="no" x="198" y="714">外部 DHCP</text>
  <text class="yes" x="394" y="756">是</text>

  <!-- start services -> boot -> monitor -> done -->
  <path class="arrow" d="M380,738 V762" marker-end="url(#a)"/>
  <rect class="step" x="210" y="764" width="340" height="42" rx="8"/><text class="t" x="380" y="790">9 · Start services（HTTP / TFTP / DHCP）</text>
  <path class="arrow" d="M380,806 V818" marker-end="url(#a)"/>
  <rect class="step" x="210" y="818" width="340" height="42" rx="8"/><text class="t" x="380" y="844">10 · 目標電腦 UEFI IPv4 PXE 開機</text>
  <path class="arrow" d="M380,860 V872" marker-end="url(#a)"/>
  <rect class="step" x="195" y="872" width="370" height="42" rx="8"/><text class="t" x="380" y="898">回 Dashboard 監看 Fleet / Evidence / Log</text>
  <path class="arrow" d="M380,914 V926" marker-end="url(#a)"/>
  <rect class="done" x="240" y="926" width="280" height="46" rx="10"/><text class="tw" x="380" y="955">✓ windows-desktop-ready</text>
</svg>
