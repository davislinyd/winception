<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Winception v2 權限、資料與部署邊界</title><desc id="desc">Web management and PXE data plane are separate trust boundaries</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto"><path d="M0 0L8 3.5 0 7Z" fill="#718096"/></marker></defs>
  <style>text{font-family:"Segoe UI","Noto Sans TC",sans-serif;fill:#1f2937}.bg{fill:#f7f2e9}.h{font-size:24px;font-weight:750}.sub{font-size:13px;fill:#6b7280}.node,.branch{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.web{fill:#e0f2fe;stroke:#0284c7}.agent{fill:#fee2e2;stroke:#dc2626}.pipe,.gate{fill:#fef3c7;stroke:#d97706}.runtime{fill:#ede9fe;stroke:#7c3aed}.done{fill:#dcfce7;stroke:#16a34a}.num{font-size:12px;font-weight:800;fill:#9c4221}.t{font-size:14px;font-weight:700}.small{font-size:12px}.bad{fill:#b91c1c}.good{fill:#15803d}.arrow{fill:none;stroke:#718096;stroke-width:2;marker-end:url(#a)}.retry{fill:none;stroke:#b91c1c;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#a)}</style>
  <rect class="bg" width="1100" height="620" rx="22"/><text class="h" x="550" y="43" text-anchor="middle">Winception v2 權限、資料與部署邊界</text><text class="sub" x="550" y="68" text-anchor="middle">Web management and PXE data plane are separate trust boundaries</text><rect class="node" x="45" y="130" width="210" height="78" rx="12"/><text class="t" x="150" y="161" text-anchor="middle">Browser</text><text class="small" x="150" y="183" text-anchor="middle">HttpOnly session · REST/SSE</text><rect class="web" x="320" y="130" width="300" height="78" rx="12"/><text class="t" x="470" y="161" text-anchor="middle">Winception.Web（低權限）</text><text class="small" x="470" y="183" text-anchor="middle">Fastify · React assets · auth · read model</text><rect class="agent" x="690" y="130" width="365" height="78" rx="12"/><text class="t" x="872.5" y="161" text-anchor="middle">Winception.Agent（高權限）</text><text class="small" x="872.5" y="183" text-anchor="middle">OperationCoordinator · safe errors</text><rect class="pipe" x="320" y="285" width="300" height="78" rx="12"/><text class="t" x="470" y="316" text-anchor="middle">ACL named pipe</text><text class="small" x="470" y="338" text-anchor="middle">版本化 schema · allow-list commands</text><rect class="node" x="45" y="440" width="250" height="82" rx="12"/><text class="t" x="170" y="471" text-anchor="middle">SQLite + DPAPI State</text><text class="small" x="170" y="493" text-anchor="middle">settings · operations · migrations · secret ciphertext</text><rect class="node" x="320" y="440" width="250" height="82" rx="12"/><text class="t" x="445" y="471" text-anchor="middle">Filesystem</text><text class="small" x="445" y="493" text-anchor="middle">WIM / ISO / logs / evidence · hash · quota</text><rect class="node" x="600" y="285" width="260" height="78" rx="12"/><text class="t" x="730" y="316" text-anchor="middle">Infrastructure adapters</text><text class="small" x="730" y="338" text-anchor="middle">PowerShell · Hyper-V · Windows network</text><rect class="runtime" x="600" y="440" width="260" height="82" rx="12"/><text class="t" x="730" y="471" text-anchor="middle">Web-selected deployment root</text><text class="small" x="730" y="493" text-anchor="middle">WinPE · profile payload · image cache</text><rect class="runtime" x="885" y="285" width="170" height="78" rx="12"/><text class="t" x="970" y="316" text-anchor="middle">獨立 PXE data plane</text><text class="small" x="970" y="338" text-anchor="middle">DHCP · TFTP · HTTP · torrent · SMB</text><rect class="done" x="885" y="440" width="170" height="82" rx="12"/><text class="t" x="970" y="471" text-anchor="middle">Windows 11 clients</text><text class="small" x="970" y="493" text-anchor="middle">WinPE → apply → SetupComplete → desktop-ready</text><path class="arrow" d="M255 169L320 169"/><path class="arrow" d="M620 169L690 169"/><path class="arrow" d="M470 208L470 285"/><path class="arrow" d="M620 324L690 208"/><path class="arrow" d="M820 208L730 285"/><path class="arrow" d="M730 363L730 440"/><path class="arrow" d="M860 481L885 481"/><path class="arrow" d="M970 363L970 440"/><path class="arrow" d="M600 481L570 481"/><path class="arrow" d="M320 481L295 481"/>
</svg>
