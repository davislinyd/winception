<svg viewBox="0 0 1400 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Winception 系統架構與資料流</title>
  <desc id="desc">從 Web 管理介面、服務編排、雙 PXE 開機模式，到 WinPE、Torrent、OSDCloud、SetupComplete 與狀態回報的完整架構。</desc>
  <style>
    :root{--ink:#23201d;--muted:#6e665d;--paper:#f7f2e9;--card:#fffdf8;--line:#d9cfbf;--rust:#9c4221;--rust2:#b75c36;--green:#2f6d53;--blue:#416b82;--amber:#9a6819}
    text{font-family:"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;fill:var(--ink)}
    .bg{fill:var(--paper)}.card{fill:var(--card);stroke:var(--line);stroke-width:1.5}.host{fill:#fdf5e9;stroke:#e6c7a5}.client{fill:#eef3ed;stroke:#c8d5ca}.control{fill:#edf2f5;stroke:#c8d4dc}
    .h1{font-size:26px;font-weight:700}.sub{font-size:14px;fill:var(--muted)}.lane{font-size:13px;font-weight:700;letter-spacing:1px;fill:var(--rust)}.t{font-size:14px;font-weight:700}.s{font-size:12px;fill:var(--muted)}.port{font-size:11px;font-family:Consolas,monospace;fill:var(--rust)}
    .arrow{fill:none;stroke:#82786c;stroke-width:2;marker-end:url(#arrow)}.data{fill:none;stroke:var(--blue);stroke-width:2;stroke-dasharray:7 5;marker-end:url(#blue)}.status{fill:none;stroke:var(--green);stroke-width:2;stroke-dasharray:4 5;marker-end:url(#green)}
    .badge{fill:#fff;stroke:var(--line)}.btxt{font-size:11px;font-weight:700;text-anchor:middle}.note{fill:#fff8e8;stroke:#e2c47d;stroke-width:1.2}.warn{font-size:11px;fill:#754d0a}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto"><path d="M0 0L8 3.5 0 7Z" fill="#82786c"/></marker>
    <marker id="blue" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto"><path d="M0 0L8 3.5 0 7Z" fill="#416b82"/></marker>
    <marker id="green" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto"><path d="M0 0L8 3.5 0 7Z" fill="#2f6d53"/></marker>
  </defs>

  <rect class="bg" width="1400" height="860" rx="24"/>
  <text class="h1" x="700" y="42" text-anchor="middle">Winception · Windows 11 零接觸部署架構</text>
  <text class="sub" x="700" y="66" text-anchor="middle">控制面、開機面、映像資料面與狀態面彼此分離；Web Console 是操作入口，不是部署 runtime 本身</text>

  <text class="lane" x="54" y="112">CONTROL PLANE · 管理與編排</text>
  <rect class="card control" x="54" y="128" width="244" height="102" rx="12"/>
  <text class="t" x="176" y="159" text-anchor="middle">技術人員瀏覽器</text><text class="s" x="176" y="182" text-anchor="middle">Winception Web Console</text><text class="port" x="176" y="205" text-anchor="middle">127.0.0.1:8080</text>
  <rect class="card control" x="346" y="128" width="286" height="102" rx="12"/>
  <text class="t" x="489" y="157" text-anchor="middle">HostTools</text><text class="s" x="489" y="180" text-anchor="middle">App＝程式；State＝本機 mutable state</text><text class="port" x="489" y="205" text-anchor="middle">C:\OSDCloud\HostTools\…</text>
  <rect class="card control" x="680" y="128" width="262" height="102" rx="12"/>
  <text class="t" x="811" y="157" text-anchor="middle">ServiceController</text><text class="s" x="811" y="180" text-anchor="middle">preflight、start/stop、sync、fleet</text><text class="port" x="811" y="205" text-anchor="middle">Node.js ESM</text>
  <rect class="card control" x="990" y="128" width="356" height="102" rx="12"/>
  <text class="t" x="1168" y="157" text-anchor="middle">Web-selected runtime root</text><text class="s" x="1168" y="180" text-anchor="middle">Media、PXE-HttpRoot、PXE-TFTP、logs</text><text class="port" x="1168" y="205" text-anchor="middle">預設 C:\OSDCloud（不可在 Git clone 內）</text>
  <path class="arrow" d="M298 179H344"/><path class="arrow" d="M632 179H678"/><path class="arrow" d="M942 179H988"/>

  <text class="lane" x="54" y="275">BOOT &amp; DELIVERY PLANE · PXE 開機與映像分發</text>
  <rect class="card host" x="54" y="292" width="206" height="116" rx="12"/>
  <text class="t" x="157" y="323" text-anchor="middle">DHCP / PXE Proxy</text><text class="port" x="157" y="345" text-anchor="middle">UDP 67</text><text class="s" x="157" y="369" text-anchor="middle">Server：配 IP＋boot option</text><text class="s" x="157" y="389" text-anchor="middle">Proxy：只提供 PXE boot option</text>
  <rect class="card host" x="286" y="292" width="206" height="116" rx="12"/>
  <text class="t" x="389" y="323" text-anchor="middle">TFTP</text><text class="port" x="389" y="345" text-anchor="middle">UDP 69</text><text class="s" x="389" y="369" text-anchor="middle">Secure Boot：bootmgfw、BCD、</text><text class="s" x="389" y="389" text-anchor="middle">boot.sdi、boot.wim</text>
  <rect class="card host" x="518" y="292" width="206" height="116" rx="12"/>
  <text class="t" x="621" y="323" text-anchor="middle">HTTP media / status</text><text class="port" x="621" y="345" text-anchor="middle">TCP 80</text><text class="s" x="621" y="369" text-anchor="middle">iPXE fallback boot、metadata、</text><text class="s" x="621" y="389" text-anchor="middle">control、status callback</text>
  <rect class="card host" x="750" y="292" width="206" height="116" rx="12"/>
  <text class="t" x="853" y="323" text-anchor="middle">Torrent tracker</text><text class="port" x="853" y="345" text-anchor="middle">TCP 6969</text><text class="s" x="853" y="369" text-anchor="middle">announce、peer discovery、</text><text class="s" x="853" y="389" text-anchor="middle">24 秒 wave / batch</text>
  <rect class="card host" x="982" y="292" width="206" height="116" rx="12"/>
  <text class="t" x="1085" y="323" text-anchor="middle">Node super-seeder</text><text class="port" x="1085" y="345" text-anchor="middle">TCP 6881</text><text class="s" x="1085" y="369" text-anchor="middle">分片供應；正常 host budget</text><text class="s" x="1085" y="389" text-anchor="middle">上限約 1.15× WIM</text>
  <rect class="card host" x="1214" y="292" width="132" height="116" rx="12"/>
  <text class="t" x="1280" y="323" text-anchor="middle">SMB</text><text class="s" x="1280" y="347" text-anchor="middle">OSDCloudiPXE</text><text class="s" x="1280" y="370" text-anchor="middle">metadata／</text><text class="s" x="1280" y="389" text-anchor="middle">direct fallback</text>

  <text class="lane" x="54" y="462">CLIENT PLANE · 目標電腦生命週期</text>
  <rect class="card client" x="54" y="480" width="248" height="166" rx="14"/>
  <text class="t" x="178" y="513" text-anchor="middle">1 · UEFI IPv4 PXE</text><text class="s" x="178" y="541" text-anchor="middle">secureboot（預設）</text><text class="s" x="178" y="562" text-anchor="middle">Microsoft-signed bootmgfw → TFTP</text><text class="s" x="178" y="590" text-anchor="middle">ipxe（fallback）</text><text class="s" x="178" y="611" text-anchor="middle">snponly.efi → HTTP wimboot</text>
  <rect class="card client" x="330" y="480" width="248" height="166" rx="14"/>
  <text class="t" x="454" y="513" text-anchor="middle">2 · WinPE + OSDCloud</text><text class="s" x="454" y="541" text-anchor="middle">掛載 SMB、讀 selected-os.json</text><text class="s" x="454" y="562" text-anchor="middle">aria2c 加入 Torrent swarm</text><text class="s" x="454" y="583" text-anchor="middle">SHA-256 驗證後套用 WIM</text><text class="s" x="454" y="611" text-anchor="middle">DISM / driver / OOBE handoff</text>
  <rect class="card client" x="606" y="480" width="248" height="166" rx="14"/>
  <text class="t" x="730" y="513" text-anchor="middle">3 · Windows Setup</text><text class="s" x="730" y="541" text-anchor="middle">SetupComplete 寫入設定</text><text class="s" x="730" y="562" text-anchor="middle">準備 post-logon finalizer</text><text class="s" x="730" y="583" text-anchor="middle">必要重開機後，SYSTEM 依 profile</text><text class="s" x="730" y="604" text-anchor="middle">安裝 Apps / Scripts</text>
  <rect class="card client" x="882" y="480" width="248" height="166" rx="14"/>
  <text class="t" x="1006" y="513" text-anchor="middle">4 · Desktop ready</text><text class="s" x="1006" y="541" text-anchor="middle">finalization 必須 succeeded</text><text class="s" x="1006" y="562" text-anchor="middle">Explorer ready、無 OOBE process</text><text class="s" x="1006" y="583" text-anchor="middle">建立 desktop-ready marker</text><text class="port" x="1006" y="611" text-anchor="middle">windows-desktop-ready</text>
  <rect class="card client" x="1158" y="480" width="188" height="166" rx="14"/>
  <text class="t" x="1252" y="513" text-anchor="middle">5 · Evidence</text><text class="s" x="1252" y="541" text-anchor="middle">Activity / Fleet</text><text class="s" x="1252" y="562" text-anchor="middle">Validation Evidence</text><text class="s" x="1252" y="583" text-anchor="middle">System Log</text><text class="s" x="1252" y="604" text-anchor="middle">client local logs</text>
  <path class="arrow" d="M302 563H328"/><path class="arrow" d="M578 563H604"/><path class="arrow" d="M854 563H880"/><path class="arrow" d="M1130 563H1156"/>
  <path class="data" d="M157 408V478"/><path class="data" d="M389 408V455H178V478"/><path class="data" d="M621 408V452H454V478"/><path class="data" d="M853 408V446H454V478"/><path class="data" d="M1085 408V440H454V478"/><path class="data" d="M1280 408V434H454V478"/>
  <path class="status" d="M1006 646V690H621V410"/><path class="status" d="M1252 646V700H811V232"/>

  <rect class="note" x="54" y="714" width="1292" height="102" rx="12"/>
  <text class="t" x="76" y="743">關鍵判讀</text>
  <text class="warn" x="76" y="769">• Secure Boot 模式直接由 Windows Boot Manager 透過 TFTP 載入 WinPE；只有 iPXE fallback 才使用 HTTP wimboot。</text>
  <text class="warn" x="76" y="791">• Torrent telemetry 是觀測資訊；週期性 telemetry 不寫入 deployment status JSONL，傳輸完整性仍以 SHA-256 與 deployment event 為準。</text>
  <text class="warn" x="76" y="813">• 截圖是 best-effort evidence；成功條件是 per-run JSON 事件到 windows-desktop-ready，且 client finalization 沒有 error / timeout。</text>
</svg>
