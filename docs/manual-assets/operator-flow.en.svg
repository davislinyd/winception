<svg viewBox="0 0 1100 890" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Winception operator flow · Setup → Deploy / Monitor → desktop-ready</title><desc id="desc">Warnings do not block; blocking failures, DHCP safety and Software Test isolation cannot be skipped</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto"><path d="M0 0L8 3.5 0 7Z" fill="#718096"/></marker></defs>
  <style>text{font-family:"Segoe UI","Noto Sans TC",sans-serif;fill:#1f2937}.bg{fill:#f7f2e9}.h{font-size:24px;font-weight:750}.sub{font-size:13px;fill:#6b7280}.node,.branch{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.web{fill:#e0f2fe;stroke:#0284c7}.agent{fill:#fee2e2;stroke:#dc2626}.pipe,.gate{fill:#fef3c7;stroke:#d97706}.runtime{fill:#ede9fe;stroke:#7c3aed}.done{fill:#dcfce7;stroke:#16a34a}.num{font-size:12px;font-weight:800;fill:#9c4221}.t{font-size:14px;font-weight:700}.small{font-size:12px}.bad{fill:#b91c1c}.good{fill:#15803d}.arrow{fill:none;stroke:#718096;stroke-width:2;marker-end:url(#a)}.retry{fill:none;stroke:#b91c1c;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#a)}</style>
  <rect class="bg" width="1100" height="890" rx="22"/><text class="h" x="550" y="43" text-anchor="middle">Winception operator flow · Setup → Deploy / Monitor → desktop-ready</text><text class="sub" x="550" y="68" text-anchor="middle">Warnings do not block; blocking failures, DHCP safety and Software Test isolation cannot be skipped</text><rect class="node" x="80" y="105" width="450" height="76" rx="12"/><text class="num" x="98" y="132">1</text><text class="t" x="305" y="150" text-anchor="middle">Install the signed MSI and sign in to loopback Web</text><rect class="node" x="570" y="105" width="450" height="76" rx="12"/><text class="num" x="588" y="132">2</text><text class="t" x="795" y="150" text-anchor="middle">Set root, DPAPI secrets, endpoint, DHCP and boot mode</text><rect class="node" x="80" y="225" width="450" height="76" rx="12"/><text class="num" x="98" y="252">3</text><text class="t" x="305" y="270" text-anchor="middle">Prepare runtime, OS image and publish profile</text><rect class="node" x="570" y="225" width="450" height="76" rx="12"/><text class="num" x="588" y="252">4</text><text class="t" x="795" y="270" text-anchor="middle">Run preflight</text><rect class="node" x="80" y="525" width="450" height="76" rx="12"/><text class="num" x="98" y="552">5</text><text class="t" x="305" y="570" text-anchor="middle">Confirm DHCP safety and start deployment ingress</text><rect class="node" x="570" y="525" width="450" height="76" rx="12"/><text class="num" x="588" y="552">6</text><text class="t" x="795" y="570" text-anchor="middle">Client UEFI IPv4 PXE</text><rect class="node" x="80" y="645" width="450" height="76" rx="12"/><text class="num" x="98" y="672">7</text><text class="t" x="305" y="690" text-anchor="middle">Track Fleet and evidence in Deploy / Monitor</text><rect class="node" x="570" y="645" width="450" height="76" rx="12"/><text class="num" x="588" y="672">8</text><text class="t" x="795" y="690" text-anchor="middle">windows-desktop-ready; stop services</text>
    <path class="arrow" d="M530 143L570 143"/><path class="arrow" d="M795 181V205H305V225"/><path class="arrow" d="M530 263L570 263"/>
    <path class="arrow" d="M795 301V350H550"/>
    <polygon class="gate" points="550,350 650,415 550,480 450,415"/><text class="t" x="550" y="410" text-anchor="middle">Any blocking failure?</text>
    <path class="retry" d="M450 415H35V263H78"/><text class="small bad" x="45" y="400">Yes: follow corrective action and rerun</text>
    <path class="arrow" d="M550 480V505H305V525"/><text class="small good" x="665" y="420">No: warnings may remain and are recorded</text>
    <path class="arrow" d="M530 563L570 563"/><path class="arrow" d="M795 601V625H305V645"/><path class="arrow" d="M530 683L570 683"/>
    <rect class="branch" x="80" y="770" width="610" height="58" rx="12"/><text class="small" x="100" y="804">Software Test branch: under one lock require ingress stopped + Fleet empty; restore checkpoint afterward</text>
    <rect class="branch" x="720" y="770" width="300" height="58" rx="12"/><text class="small" x="740" y="804">Offline ISO is an additive snapshot; it does not replace PXE acceptance</text>
</svg>
